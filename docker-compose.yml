version: "3.9"
services:
  postgres:
    image: postgres:15
    container_name: b2b_postgres
    environment:
      POSTGRES_USER: b2b
      POSTGRES_PASSWORD: b2bpassword
      POSTGRES_DB: b2b_mvp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
